name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        env:
          # Build-time only; runtime API calls are not exercised in CI.
          GEMINI_API_KEY: ci-placeholder
          RAKUTEN_APP_ID: ci-placeholder
          RAKUTEN_ACCESS_KEY: ci-placeholder
          RAKUTEN_AFFILIATE_ID: ci-placeholder
          NEXT_PUBLIC_SITE_URL: https://kaimono.example
        run: npm run build
